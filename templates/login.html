<!DOCTYPE html>
<html>
<head>
    <title>Bus Booking Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

<div class="box">
    <h2>Bus Booking System</h2>

    <form method="POST" action="/login" id="loginForm">
        <div class="slider-toggle" id="roleSlider">
            <span class="slider-label active" data-role="user">Normal User</span>
            <span class="slider-label" data-role="admin">Admin</span>
            <div class="slider-thumb"></div>
        </div>

        <input type="hidden" name="role" value="user" id="roleInput">

        <div id="user-fields" class="role-fields">
            <input type="text" name="username" placeholder="Enter Your Name" id="normal_username" required>
        </div>

        <div id="admin-fields" class="role-fields admin-fields">
            <input type="text" name="admin_username" placeholder="Admin Username" id="admin_username">
            <input type="password" name="password" placeholder="Password" id="password">
        </div>

        <button type="submit">Continue</button>
    </form>
</div>

<script>
    const roleSlider = document.getElementById('roleSlider');
    const roleInput = document.getElementById('roleInput');
    const userFields = document.getElementById('user-fields');
    const adminFields = document.getElementById('admin-fields');
    const normalUsernameInput = document.getElementById('normal_username');
    const adminUsernameInput = document.getElementById('admin_username');
    const passwordInput = document.getElementById('password');
    const roleLabels = document.querySelectorAll('.slider-label');

    function selectRole(role) {
        roleInput.value = role;
        const isUser = role === 'user';
        const isAdmin = role === 'admin';
        
        userFields.classList.toggle('show', isUser);
        adminFields.classList.toggle('show', isAdmin);
        
        normalUsernameInput.required = isUser;
        normalUsernameInput.disabled = !isUser;
        
        adminUsernameInput.required = isAdmin;
        adminUsernameInput.disabled = !isAdmin;
        
        passwordInput.required = isAdmin;
        passwordInput.disabled = !isAdmin;

        roleLabels.forEach((label) => {
            label.classList.toggle('active', label.dataset.role === role);
        });
        roleSlider.dataset.role = role;
    }

    roleSlider.addEventListener('click', (event) => {
        const label = event.target.closest('.slider-label');
        if (!label) return;
        selectRole(label.dataset.role);
    });

    selectRole('user');
</script>

</body>
</html>
